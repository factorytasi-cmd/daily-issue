<style>

  .topbar p { font-size: 11px; font-weight: 400; color: #888888; margin-top: 1px; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #E8E8E4; }
  .card-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

  .config-row input:focus { outline: none; border-color: #0D9488; }

  .rec-center { display: flex; flex-direction: column; align-items: center; padding: 8px 0 4px; gap: 12px; }

  .rec-ring.recording { background: #E94560; animation: recpulse 1.4s infinite; }

  .btn-row { display: flex; gap: 8px; margin-top: 4px; }
  .btn { flex: 1; padding: 11px 0; border-radius: 10px; border: 1px solid #E0E0DC; font-size: 13px; font-weight: 500; cursor: pointer; background: #fff; color: #1A1A1A; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
  .btn:hover { background: #F5F5F0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1A1A2E; color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; z-index: 99; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #C0293F; }
  .toast.success { background: #2E7D32; }

  .empty-preview { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
  audio { width: 100%; margin-top: 10px; border-radius: 8px; }
  .section-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0 12px; }
  .section-divider span { font-size: 11px; color: #aaa; white-space: nowrap; }
  .section-divider::before,.section-divider::after { content:''; flex:1; height:1px; background:#E8E8E4; }

  <div>
    <h1>LITRA-ASI</h1>

<div class="container">

  <div class="card">

        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>

<div class="toast" id="toast"></div>

<script>
const APIKEY_KEY = 'dip_apikey';
const GASURL_KEY = 'dip_gasurl';
const MASTER_SHEET_ID = '1PBEi36QhSFiXnu61XJAdwX-I34-0U3e9FZOd-Db0qlI';
const MASTER_SHEET_NAME = 'MASTER LIST STYLE';

let masterStyles = [];
let masterSPOs = [];
let parsedRows = [];
let mediaRec = null, chunks = [], recInterval = null, recSecs = 0, isRec = false;
let waveInterval = null;
let recognition = null, liveText = '';

window.onload = async () => {
  const ak = localStorage.getItem(APIKEY_KEY);
  const gu = localStorage.getItem(GASURL_KEY);
  if (ak) document.getElementById('cfg-apikey').value = ak;
  if (gu) document.getElementById('cfg-gasurl').value = gu;
  document.getElementById('cfg-apikey').addEventListener('change', e => localStorage.setItem(APIKEY_KEY, e.target.value.trim()));
  document.getElementById('cfg-gasurl').addEventListener('change', e => localStorage.setItem(GASURL_KEY, e.target.value.trim()));
  await loadMasterList();
};

// ======= LOAD MASTER LIST =======
async function loadMasterList() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${MASTER_SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(MASTER_SHEET_NAME)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Gagal fetch');
    const text = await res.text();
    masterStyles = []; masterSPOs = [];
    const lines = text.trim().split('\n');
    const startIdx = (lines[0].toLowerCase().includes('style') || lines[0].toLowerCase().includes('spo')) ? 1 : 0;
    lines.slice(startIdx).forEach(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let c of line) {
        if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      const style = cols[0]?.replace(/^"|"$/g,'').trim();
      const spo = cols[1]?.replace(/^"|"$/g,'').trim();
      if (style && style.length > 0) masterStyles.push(style);
      if (spo && spo.length > 0) masterSPOs.push(spo);
    });
    setStatus(`✅ Master list: ${masterStyles.length} style, ${masterSPOs.length} SPO`);
  } catch(e) {
    setStatus('⚠️ Gagal load master list: ' + e.message);
  }
}

// ======= WAVE ANIMATION =======
const bars = document.querySelectorAll('.wave-bar');
function animWave(on) {
  clearInterval(waveInterval);
  if (on) { waveInterval = setInterval(() => { bars.forEach(b => b.style.height = (4 + Math.random() * 28) + 'px'); }, 80); }
  else { const h=[4,8,14,20,26,22,16,10,6,10,18,24,18,12,6]; bars.forEach((b,i) => b.style.height=(h[i]||6)+'px'); }
}
function fmt2(n){return String(n).padStart(2,'0')}
function fmtTime(s){return fmt2(Math.floor(s/60))+':'+fmt2(s%60)}

// ======= RECORD =======
async function toggleRecord() {
  if (!isRec) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      chunks = []; recSecs = 0;
      mediaRec = new MediaRecorder(stream);
      mediaRec.ondataavailable = e => chunks.push(e.data);
      mediaRec.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, {type:'audio/webm'});
        document.getElementById('audio-player').src = URL.createObjectURL(blob);
        document.getElementById('audio-player').style.display = 'block';
        document.getElementById('rec-btn').className = 'rec-ring done';
        document.getElementById('rec-icon').textContent = '✅';
        document.getElementById('rec-status').textContent = 'Rekaman selesai. Dengarkan atau lanjut parsing.';
        animWave(false);
      };
      mediaRec.start(); isRec = true;
      document.getElementById('rec-btn').className = 'rec-ring recording';
      document.getElementById('rec-icon').textContent = '⏹️';
      document.getElementById('rec-status').textContent = 'Sedang merekam… tekan lagi untuk berhenti';
      animWave(true);
      recInterval = setInterval(() => { recSecs++; document.getElementById('timer').textContent = fmtTime(recSecs); }, 1000);
      startLiveSpeech();
    } catch(e) { showToast('Izin mikrofon ditolak', 'error'); }
  } else {
    mediaRec.stop(); isRec = false;
    clearInterval(recInterval);
    stopLiveSpeech();
  }
}

// ======= SPEECH RECOGNITION =======
function startLiveSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Ketik transkripsi manual atau gunakan mic keyboard.'); return; }
  recognition = new SR();
  recognition.lang = 'id-ID';
  recognition.continuous = true;
  recognition.interimResults = true;
  liveText = '';
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) liveText += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('transkrip').value = liveText + interim;
  };
  recognition.onerror = () => {};
  recognition.start();
  setStatus('🔴 Merekam dan mentranskripsi…');
}
function stopLiveSpeech() {
  if (recognition) { try { recognition.stop(); } catch(e){} }
  setStatus('Transkripsi selesai. Periksa teks, lalu tekan Parsing AI.');
}

// ======= SIMILARITY (fuzzy match) =======
function similarity(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  if (a === b) return 1;
  // Exact contain
  if (b.includes(a) || a.includes(b)) return 0.9;
  // SPO format match: cek prefix dan tahun
  const spoA = a.replace(/[^a-z0-9]/g,'');
  const spoB = b.replace(/[^a-z0-9]/g,'');
  if (spoA === spoB) return 0.95;
  if (spoA.length >= 4 && spoB.startsWith(spoA.slice(0,4))) return 0.8;
  // Word match
  const wordsA = a.split(/[\s\-\/]+/).filter(w => w.length > 1);
  const wordsB = b.split(/[\s\-\/]+/).filter(w => w.length > 1);
  if (wordsA.length === 0) return 0;
  let matches = wordsA.filter(w => wordsB.some(wb => wb.includes(w) || w.includes(wb))).length;
  return matches / Math.max(wordsA.length, wordsB.length);
}

function getTopMatches(query, list, topN = 4) {
  if (!query || query === '-' || list.length === 0) {
    return list.slice(0, topN).map(v => ({value: v, score: 0}));
  }
  const scored = list.map(v => ({value: v, score: similarity(query, v)}));
  scored.sort((a, b) => b.score - a.score);
  // Filter duplikat
  const seen = new Set();
  const unique = scored.filter(m => { if (seen.has(m.value)) return false; seen.add(m.value); return true; });
  return unique.slice(0, topN);
}

// ======= AI PARSING =======
async function parseWithAI() {
  const apiKey = document.getElementById('cfg-apikey').value.trim();
  const transkrip = document.getElementById('transkrip').value.trim();
  if (!apiKey) { showToast('Isi API Key dulu', 'error'); return; }
  if (!transkrip) { showToast('Transkripsi kosong', 'error'); return; }

  document.getElementById('btn-parse').disabled = true;
  setStatus('<span class="dot-anim"><span></span><span></span><span></span></span> AI sedang menganalisis…', true);

  const today = new Date().toLocaleDateString('id-ID', {day:'2-digit',month:'2-digit',year:'numeric'});

  const prompt = `Kamu adalah sistem ekstraksi data untuk laporan produksi pabrik sepatu/garmen.

Dari transkripsi audio berikut, ekstrak data dan kembalikan HANYA JSON array (tanpa penjelasan, tanpa markdown).

Aturan:
- Jika ada beberapa size, buat SATU objek per size
- Tanggal hari ini: ${today}
- Kategori: tentukan sendiri berdasarkan isi issue (contoh: Material Defect, Sewing Defect, Cutting Error, Machine Down, Material Shortage, Quality Issue, dll)
- Jika ada field yang tidak disebutkan, isi dengan "-"
- qty harus angka saja (tanpa satuan)
- "pic" adalah nama leader/supervisor yang melapor (biasanya disebut di awal)
- "operator" adalah nama operator (biasanya setelah kata "oleh operator")
- "spo" adalah nomor kode produksi (biasanya setelah kata "SPO") - tulis apa adanya dari transkripsi
- "style" adalah nama produk/style yang diproduksi (BUKAN nama divisi, line, atau kode lain). Tulis apa adanya dari transkripsi. Contoh: "Tour Authentic 2025", "Stablegrip Natural Fit 2016"
- "divisi" adalah divisi/bagian produksi

Format JSON:
[{"tanggal":"...","divisi":"...","pic":"...","style":"...","issue":"...","size":"...","qty":"...","kategori":"...","operator":"...","spo":"..."}]

Transkripsi:
"${transkrip}"`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1000, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const clean = data.content[0].text.trim().replace(/```json|```/g,'').trim();
    parsedRows = JSON.parse(clean);

    // Tampilkan konfirmasi style & SPO
    tampilkanKonfirmasi(parsedRows[0]);
    setStatus('✅ Parsing selesai! Konfirmasi Style & SPO di bawah.');
    showToast('Parsing berhasil!', 'success');
  } catch(e) {
    setStatus('❌ Gagal parsing: ' + e.message);
    showToast('Gagal parsing AI', 'error');
  }
  document.getElementById('btn-parse').disabled = false;
}

// ======= TAMPILKAN KONFIRMASI =======
function tampilkanKonfirmasi(row) {
  const styleMatches = getTopMatches(row.style, masterStyles, 4);
  const spoMatches = getTopMatches(row.spo, masterSPOs, 4);

  // Render style options
  let styleHtml = '';
  styleMatches.forEach((m, i) => {
    const badgeClass = m.score > 0.7 ? 'match-high' : 'match-med';
    const badgeText = m.score > 0.7 ? 'Mirip' : 'Mungkin';
    const badgeHtml = m.score > 0 ? `<span class="match-badge ${badgeClass}">${badgeText}</span>` : '';
    styleHtml += `<label class="suggest-item" id="style-item-${i}">
      <input type="radio" name="style-pick" value="${m.value}" ${i===0?'checked':''} onchange="highlightSelected('style',${i},${styleMatches.length})">
      <span>${m.value}</span>${badgeHtml}
    </label>`;
  });
  const styleTotal = styleMatches.length;
  const rawStyle = parsedRows[0]?.style && parsedRows[0].style !== '-' ? parsedRows[0].style : '';
  if (rawStyle) {
    styleHtml += `<label class="suggest-skip" id="style-item-${styleTotal}" style="border-color:#0D9488;color:#0D9488;">
      <input type="radio" name="style-pick" value="${rawStyle}" onchange="highlightSelected('style',${styleTotal},${styleTotal+1})">
      <span>📝 Pakai dari transkripsi: <b>${rawStyle}</b></span>
    </label>`;
  }
  styleHtml += `<label class="suggest-skip" id="style-item-${styleTotal+1}">
    <input type="radio" name="style-pick" value="-" onchange="highlightSelected('style',${styleTotal+1},${styleTotal+1})">
    <span>⏭️ Lewati (kosongkan Style)</span>
  </label>`;

  // Render SPO options
  let spoHtml = '';
  spoMatches.forEach((m, i) => {
    const badgeClass = m.score > 0.7 ? 'match-high' : 'match-med';
    const badgeText = m.score > 0.7 ? 'Mirip' : 'Mungkin';
    const badgeHtml = m.score > 0 ? `<span class="match-badge ${badgeClass}">${badgeText}</span>` : '';
    spoHtml += `<label class="suggest-item" id="spo-item-${i}">
      <input type="radio" name="spo-pick" value="${m.value}" ${i===0?'checked':''} onchange="highlightSelected('spo',${i},${spoMatches.length})">
      <span>${m.value}</span>${badgeHtml}
    </label>`;
  });
  const spoTotal = spoMatches.length;
  // Opsi: pakai dari transkripsi
  const rawSpo = parsedRows[0]?.spo && parsedRows[0].spo !== '-' ? parsedRows[0].spo : '';
  if (rawSpo) {
    spoHtml += `<label class="suggest-skip" id="spo-item-${spoTotal}" style="border-color:#0D9488;color:#0D9488;">
      <input type="radio" name="spo-pick" value="${rawSpo}" onchange="highlightSelected('spo',${spoTotal},${spoTotal+1})">
      <span>📝 Pakai dari transkripsi: <b>${rawSpo}</b></span>
    </label>`;
  }
  // Opsi: lewati
  spoHtml += `<label class="suggest-skip" id="spo-item-${spoTotal+1}">
    <input type="radio" name="spo-pick" value="-" onchange="highlightSelected('spo',${spoTotal+1},${spoTotal+1})">
    <span>⏭️ Lewati (kosongkan SPO)</span>
  </label>`;

  document.getElementById('style-suggest').innerHTML = styleHtml;
  document.getElementById('spo-suggest').innerHTML = spoHtml;
  document.getElementById('confirm-card').style.display = 'block';
  highlightSelected('style', 0, styleMatches.length);
  highlightSelected('spo', 0, spoMatches.length);

  // Scroll ke konfirmasi
  document.getElementById('confirm-card').scrollIntoView({behavior:'smooth', block:'start'});
}

function highlightSelected(type, idx, total) {
  for (let i = 0; i <= total; i++) {
    const el = document.getElementById(`${type}-item-${i}`);
    if (el) {
      if (i === idx) el.classList.add('selected');
      else el.classList.remove('selected');
    }
  }
}

// ======= KONFIRMASI & PREVIEW =======
function konfirmasiDanPreview() {
  const stylePick = document.querySelector('input[name="style-pick"]:checked')?.value || '-';
  const spoPick = document.querySelector('input[name="spo-pick"]:checked')?.value || '-';

  parsedRows = parsedRows.map(r => ({...r, style: stylePick, spo: spoPick}));
  renderPreview(parsedRows);
  document.getElementById('btn-kirim').disabled = false;
  document.getElementById('confirm-card').style.display = 'none';
  setStatus('✅ Data siap dikirim ke Google Sheet!');
  document.getElementById('preview-area').scrollIntoView({behavior:'smooth'});
}

// ======= RENDER PREVIEW =======
function renderPreview(rows) {
  if (!rows.length) return;
  let html = '<div class="preview-wrap"><table><thead><tr>';
  ['Tanggal','Divisi','PIC','Style','Issue','Size','Qty','Kategori','Operator','SPO'].forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr>
      <td>${r.tanggal}</td><td>${r.divisi}</td><td>${r.pic}</td>
      <td>${r.style}</td><td>${r.issue}</td><td>${r.size}</td><td>${r.qty}</td>
      <td><span class="badge-kategori">${r.kategori}</span></td>
      <td>${r.operator}</td><td>${r.spo}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('preview-area').innerHTML = html;
}

// ======= KIRIM KE SHEET =======
async function kirimKeSheet() {
  const gasUrl = document.getElementById('cfg-gasurl').value.trim();
  if (!gasUrl) { showToast('Isi Script URL dulu', 'error'); return; }
  if (!parsedRows.length) { showToast('Tidak ada data', 'error'); return; }
  document.getElementById('btn-kirim').disabled = true;
  setStatus('<span class="dot-anim"><span></span><span></span><span></span></span> Mengirim ke Google Sheet…', true);
  try {
    await fetch(gasUrl, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rows:parsedRows})});
    setStatus('✅ Data berhasil dikirim ke Google Sheet!');
    showToast('Berhasil masuk ke Sheet!', 'success');
    parsedRows = [];
    setTimeout(() => clearAll(), 3000);
  } catch(e) {
    setStatus('❌ Gagal kirim: ' + e.message);
    showToast('Gagal kirim ke Sheet', 'error');
    document.getElementById('btn-kirim').disabled = false;
  }
}

// ======= UTILS =======
function clearAll() {
  document.getElementById('transkrip').value = '';
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('rec-btn').className = 'rec-ring';
  document.getElementById('rec-icon').textContent = '🎙️';
  document.getElementById('rec-status').textContent = 'Tekan untuk mulai merekam';
  document.getElementById('audio-player').style.display = 'none';
  document.getElementById('audio-player').src = '';
  document.getElementById('preview-area').innerHTML = '<div class="empty-preview">Belum ada data. Rekam dan parsing terlebih dahulu.</div>';
  document.getElementById('confirm-card').style.display = 'none';
  document.getElementById('btn-kirim').disabled = true;
  setStatus('');
  animWave(false);
  recSecs = 0; parsedRows = [];
}

function setStatus(msg, raw=false) {
  const el = document.getElementById('status-bar');
  if (raw) el.innerHTML = msg; else el.textContent = msg;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.className = 'toast', 2800);
}
</script>
